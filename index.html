<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Family Market Delivery System</title>
  <link rel="manifest" href="manifest.webmanifest" />
  <link rel="icon" type="image/png" href="icon.png" />
  <link rel="apple-touch-icon" href="icon.png" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div id="app">
    <header class="hero">
      <div class="hero-inner">
        <img src="icon.png" alt="Logo" class="logo" onerror="this.style.display='none'" />
        <div>
          <h1>Family Market Delivery System</h1>
          <p>Offline-ready sales, stock, procurement, fuel, and daily profit tracking</p>
        </div>
      </div>
    </header>

    <nav class="home-actions" id="homeActions"></nav>

    <main id="view"></main>
  </div>

  <template id="home-template">
    <section class="panel">
      <h2>Home</h2>
      <p class="muted">Choose what you want to do.</p>
      <div class="grid cards">
        <button class="big-btn" data-route="new-delivery">New Lieferschein</button>
        <button class="big-btn" data-route="edit-products">Edit Product List</button>
        <button class="big-btn" data-route="stock">Stock Values</button>
        <button class="big-btn" data-route="procurement">Procurement Prices</button>
        <button class="big-btn" data-route="fuel">Fuel Data for Today</button>
        <button class="big-btn" data-route="dashboard">End Day / Dashboard</button>
        <button class="big-btn" data-route="backup">Backup / Restore</button>
      </div>
    </section>
  </template>

  <script src="app.js"></script>
</body>
</html>
