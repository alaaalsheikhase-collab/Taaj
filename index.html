<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Taj System</title>
<link rel="manifest" href="manifest.json">
<style>
body{font-family:sans-serif;padding:10px}
button{margin:5px;padding:10px}
.invoice-header{text-align:center;margin-bottom:15px}
.invoice-logo{width:80px;display:block;margin:0 auto 10px}
</style>
</head>
<body>

<h2>Taj System</h2>

<button onclick="show('products')">Products</button>
<button onclick="show('invoice')">Lieferschein</button>

<div id="products">
<h3>Add Product</h3>
<input id="en" placeholder="English">
<input id="ar" placeholder="Arabic">
<input id="price" type="number" placeholder="€/kg">
<input id="bag" type="number" placeholder="Bag kg (default 5)">
<button onclick="add()">Add</button>
<ul id="list"></ul>
</div>

<div id="invoice" style="display:none">
<div class="invoice-header">
<img src="icon.png" class="invoice-logo">
<h2>Lieferschein</h2>
</div>
<div id="inv"></div>
<h3>Total € <span id="total">0</span></h3>
</div>

<script src="app.js"></script>
</body>
</html>
