<!DOCTYPE html><html><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Taj Business</title><link rel="manifest" href="manifest.json"><link rel="stylesheet" href="styles.css"></head><body><h2>Taj Business System</h2><button onclick="show('products')">Products</button><button onclick="show('invoice')">Invoice</button><button onclick="show('dashboard')">Dashboard</button><div id="products"><input id="en" placeholder="English"><input id="ar" placeholder="Arabic"><input id="price" type="number" placeholder="€/kg"><input id="cost" type="number" placeholder="Cost"><input id="bag" type="number" placeholder="Bag kg (5 default)"><button onclick="add()">Add</button><ul id="list"></ul></div><div id="invoice" style="display:none"><div id="inv"></div><h3>Total €<span id="total">0</span></h3></div><div id="dashboard" style="display:none"><h3>Revenue €<span id="rev">0</span></h3></div><script src="app.js"></script></body></html>
